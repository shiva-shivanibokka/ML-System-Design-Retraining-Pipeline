version: "3.9"

# =============================================================================
# ML System Design: Automated Retraining Pipeline
# Local dev services: MLflow + Prefect Server + pipeline worker.
# The dashboard is a Next.js app on Vercel (see frontend/) — not part of this
# compose stack. The model-serving API deploys to a Hugging Face Docker Space
# (see serving/Dockerfile); it is not run here either.
# =============================================================================
# Quick start:
#   docker-compose up --build
#
# Then:
#   python pipelines/flows.py --flow full  # run full pipeline locally
#   open http://localhost:5000             # MLflow UI
#   open http://localhost:4200             # Prefect UI

networks:
  pipeline-net:
    driver: bridge

volumes:
  mlflow-data:
  prefect-data:

services:

  # ── MLflow Tracking Server ─────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: retraining_mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow-data:/mlflow
    networks:
      - pipeline-net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Prefect Server ─────────────────────────────────────────────────────────
  prefect:
    image: prefecthq/prefect:2-python3.11
    container_name: retraining_prefect
    restart: unless-stopped
    ports:
      - "4200:4200"
    command: prefect server start --host 0.0.0.0 --port 4200
    volumes:
      - prefect-data:/root/.prefect
    networks:
      - pipeline-net
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: "sqlite+aiosqlite:////root/.prefect/prefect.db"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4200/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Pipeline Worker ────────────────────────────────────────────────────────
  # One-shot: runs the full pipeline on the latest real batch. Requires the
  # DVC-tracked datasets to be present on the host ./data (run `dvc pull` or
  # data/build_batches.py first).
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: retraining_pipeline
    restart: "no"
    command: python pipelines/flows.py --flow full
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      PREFECT_API_URL: http://prefect:4200/api
      PYTHONPATH: /app
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./models:/app/models
    depends_on:
      mlflow:
        condition: service_healthy
    networks:
      - pipeline-net
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4g
