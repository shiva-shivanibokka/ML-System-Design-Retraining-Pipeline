name: Scheduled retraining

# Nightly retrain against the DVC-tracked Lending Club batches on DagsHub.
# The whole job is a no-op unless the DagsHub MLflow secret is configured, so
# forks without secrets don't fail. Runs `--flow full`, which drift-checks the
# latest real batch and retrains + validates + promotes only if drift triggers.

on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC nightly
  workflow_dispatch:
    inputs:
      flow:
        description: "Flow to run"
        type: choice
        options: [full, drift]
        default: full
      batch_date:
        description: "Batch (YYYY-MM, blank = latest). full picks the latest itself; use a mature batch (e.g. 2017-07) for drift."
        type: string
        default: ""

jobs:
  retrain:
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
      # DagsHub DVC (S3-compatible) uses the token as both access + secret key.
      AWS_ACCESS_KEY_ID: ${{ secrets.DAGSHUB_TOKEN }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.DAGSHUB_TOKEN }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Check secrets are configured
        id: guard
        run: echo "ok=${{ secrets.MLFLOW_TRACKING_URI != '' }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.guard.outputs.ok == 'true'

      - uses: actions/setup-python@v5
        if: steps.guard.outputs.ok == 'true'
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        if: steps.guard.outputs.ok == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Pull DVC-tracked datasets from DagsHub
        if: steps.guard.outputs.ok == 'true'
        run: dvc pull -v

      - name: Run retraining pipeline
        if: steps.guard.outputs.ok == 'true'
        # Run as a module so the repo root is on sys.path (top-level packages
        # like `alerting`/`configs` are importable). `python pipelines/flows.py`
        # puts pipelines/ on the path instead and fails with ModuleNotFoundError.
        # Defaults to the full flow on the latest batch (the nightly cron path);
        # workflow_dispatch can pick `drift` and a specific mature batch.
        env:
          FLOW: ${{ inputs.flow || 'full' }}
          BATCH_DATE: ${{ inputs.batch_date }}
        run: |
          if [ -n "$BATCH_DATE" ]; then
            python -m pipelines.flows --flow "$FLOW" --batch-date "$BATCH_DATE"
          else
            python -m pipelines.flows --flow "$FLOW"
          fi

      - name: Refresh champion on the serving Space
        # Best-effort: after a promote, tell the HF serving API to reload the
        # champion into memory so /predict serves the new model without a manual
        # restart. Never fails the retrain if the Space is asleep or the call is
        # flaky. Requires HF_SPACE_ID; ADMIN_TOKEN only if the Space sets one.
        if: steps.guard.outputs.ok == 'true'
        env:
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          if [ -z "${HF_SPACE_ID}" ]; then echo "HF_SPACE_ID not set; skipping reload."; exit 0; fi
          host="$(printf '%s' "$HF_SPACE_ID" | sed 's#[/_]#-#g')"
          url="https://${host}.hf.space/admin/reload-champion"
          echo "Reloading champion at ${url}"
          code=$(curl -s -o /tmp/reload.json -w '%{http_code}' --max-time 60 \
            -X POST "$url" -H "X-Admin-Token: ${ADMIN_TOKEN}" || echo 000)
          echo "reload http=${code} body=$(cat /tmp/reload.json 2>/dev/null)"
          if [ "$code" != "200" ]; then echo "::warning::champion reload returned ${code} (non-fatal)"; fi

      - name: Report skip
        if: steps.guard.outputs.ok != 'true'
        run: echo "DagsHub MLflow secrets not set; skipping scheduled retrain."
